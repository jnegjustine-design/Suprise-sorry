<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Journey 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            transition: all 0.8s ease;
            opacity: 0;
        }

        /* Page containers - hidden by default */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .page.active {
            opacity: 1;
            transform: scale(1);
        }

        /* ================= APOLOGY PAGE ================= */
        #apology-page {
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .apology-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            animation: pulse 3s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Apology effects */
        .hearts, .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: sparkleAnim 2s infinite ease-in-out;
        }

        @keyframes sparkleAnim {
            0%, 100% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1) rotate(180deg); opacity: 1; }
        }

        .heart-icon { font-size: 80px; color: #ff6b6b; margin-bottom: 20px; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .sorry-text {
            font-family: 'Dancing Script', cursive;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #fff, 0 0 30px #ff6b6b, 0 0 40px #ff6b6b; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #ff9ff3, 0 0 30px #ff9ff3; }
        }

        .message { font-size: 20px; color: #fff; line-height: 1.6; margin-bottom: 30px; opacity: 0.95; }
        .signature { font-size: 24px; font-weight: 600; color: #fff; margin-top: 20px; animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* ================= GOOD MORNING PAGE ================= */
        #goodmorning-page {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #goodmorning-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            animation: gradientShift2 15s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes gradientShift2 {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }

        .gm-container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .sun {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF8C00);
            border-radius: 50%;
            margin: 0 auto 30px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3);
            animation: sunrise 3s ease-out infinite alternate;
        }

        @keyframes sunrise {
            0% { transform: scale(0.8) translateY(10px); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
            100% { transform: scale(1) translateY(0); box-shadow: 0 0 50px rgba(255, 215, 0, 0.8); }
        }

        .gm-title {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, rgba(255, 255, 255, 0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: glow2 2s ease-in-out infinite alternate;
        }

        @keyframes glow2 {
            from { filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)); }
        }

        .gm-subtitle { font-size: 1.5rem; color: rgba(255, 255, 255, 0.9); font-weight: 300; margin-bottom: 40px; }

        /* Navigation Buttons */
        .nav-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            position: relative;
            overflow: hidden;
        }

        .apology-next-btn {
            background: linear-gradient(45deg, #48dbfb, #ff9ff3);
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .apology-next-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(72, 219, 251, 0.4);
        }

        .gm-back-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff9ff3);
        }

        .gm-back-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6);
        }

        .gm-start-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #333;
            font-weight: 700;
        }

        .gm-start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sorry-text, .gm-title { font-size: 2.5rem; }
            .apology-container { padding: 40px 20px; margin: 20px; }
            .message, .gm-subtitle { font-size: 1.2rem; }
            .nav-btn { padding: 12px 25px; font-size: 1rem; display: block; margin: 10px auto; }
        }
    </style>
</head>
<body>
    <!-- APOLOGY PAGE -->
    <div id="apology-page" class="page active">
        <div class="hearts" id="hearts"></div>
        <div class="sparkles" id="sparkles"></div>
        
        <div class="apology-container">
            <div class="heart-icon">💖</div>
            <div class="sorry-text">I'm So Sorry!</div>
            <p class="message">
                I never meant to hurt you. 
                <br>Your happiness means everything to me.
                <br>💕 Please forgive me 💕
            </p>
            <div class="signature">With all my love ❤️</div>
            <button class="nav-btn apology-next-btn" onclick="goToGoodMorning()">
                🌅 Tomorrow's Surprise → Good Morning!
            </button>
        </div>
    </div>

    <!-- GOOD MORNING PAGE -->
    <div id="goodmorning-page" class="page">
        <div class="particles" id="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <div class="gm-container">
            <div class="sun"></div>
            <h1 class="gm-title">Good Morning! 🌅</h1>
            <p class="gm-subtitle">Rise and shine, beautiful soul!</p>
            
            <div>
                <button class="nav-btn gm-back-btn" onclick="goToApology()">
                    💖 Back to My Apology
                </button>
                <br>
                <button class="nav-btn gm-start-btn" onclick="startTheDay()">
                    ✨ Start Your Amazing Day!
                </button>
            </div>
        </div>
    </div>

    <script>
        // Page navigation
        function goToApology() {
            fadeOutPage('goodmorning-page', 'apology-page');
        }

        function goToGoodMorning() {
            fadeOutPage('apology-page', 'goodmorning-page');
        }

        function fadeOutPage(currentPageId, nextPageId) {
            const currentPage = document.getElementById(currentPageId);
            const nextPage = document.getElementById(nextPageId);
            
            currentPage.classList.remove('active');
            nextPage.classList.add('active');
        }

        // Apology page effects
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖', '💕', '💗', '💝', '✨'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('sparkles').appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 2000);
        }

        // Good morning sparkle
        function createGMSparkle() {
            const sparkle = document.createElement('div');
            sparkle.style.cssText = `
                position: absolute;
                width: 4px; height: 4px;
                background: #FFD700;
                border-radius: 50%;
                left: ${Math.random() * 100}vw;
                top: ${Math.random() * 100}vh;
                animation: sparkleAnim 1s ease-out forwards;
                pointer-events: none;
                z-index: 20;
            `;
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }

        function startTheDay() {
            // Celebration effect
            for(let i = 0; i < 20; i++) {
                setTimeout(() => createGMSparkle(), i * 100);
            }
            setTimeout(() => {
                alert('🌟 Have the most wonderful day ever! I love you! 💕');
            }, 500);
        }

        // Initialize
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
            
            // Start effects
            setInterval(createHeart, 300);
            setInterval(createSparkle, 200);
            setInterval(() => document.getElementById('particles').children[0].style.animationDelay = Math.random() * 2 + 's', 2000);
        });
    </script>
</body>
</html>
